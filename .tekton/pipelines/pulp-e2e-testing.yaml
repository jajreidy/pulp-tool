apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: pulp-e2e-testing
  labels:
    appstudio.openshift.io/application: tooling
    appstudio.openshift.io/component: pulp-e2e-testing
    pipelines.appstudio.openshift.io/type: build
spec:
  params:
    - name: git-url
      description: URL of the Git repository to clone
      type: string
    - name: revision
      description: Git revision to checkout
      type: string
    - name: output-image
      description: Fully qualified image name for the output
      type: string
    - name: rebuild
      description: Force rebuild even if image exists
      type: string
      default: "false"
    - name: skip-checks
      description: Skip checks during pipeline execution
      type: string
      default: "false"
    - name: image-expires-after
      description: Image expiration time
      type: string
      default: 5d
  workspaces:
    - name: test
      description: Workspace for test artifacts
    - name: repository
      description: Workspace for cloned repository
    - name: git-auth
      description: Git authentication credentials
      optional: true
  tasks:
    - name: init
      params:
        - name: image-url
          value: $(params.output-image)
        - name: rebuild
          value: $(params.rebuild)
        - name: skip-checks
          value: $(params.skip-checks)
      taskRef:
        params:
          - name: name
            value: init
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-init:0.4@sha256:5a423246792ac501ea279229b42ee57da9927da441c04b5c9ff86817b0856b08
          - name: kind
            value: task
        resolver: bundles
    - name: clone-repository
      runAfter:
        - init
      when:
        - input: $(tasks.init.results.build)
          operator: in
          values:
            - "true"
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.revision)
      taskRef:
        params:
          - name: name
            value: git-clone
          - name: bundle
            value: quay.io/konflux-ci/tekton-catalog/task-git-clone:0.2@sha256:732a8249f3aa01e8876949eb26c555b8e65436c60969a1459e587aca1de4e544
          - name: kind
            value: task
        resolver: bundles
      workspaces:
        - name: output
          workspace: repository
        - name: basic-auth
          workspace: git-auth
    - name: run-e2e-test-suite
      runAfter:
        - clone-repository
      taskRef:
        resolver: git
        params:
          - name: revision
            value: $(params.revision)
          - name: url
            value: $(params.git-url)
          - name: pathInRepo
            value: ".tekton/tasks/run-e2e-test-suite.yaml"
      workspaces:
        - name: test
          workspace: test
        - name: repository
          workspace: repository
  finally:
    - name: post-test-cleanup
      taskRef:
        resolver: git
        params:
          - name: revision
            value: $(params.revision)
          - name: url
            value: $(params.git-url)
          - name: pathInRepo
            value: ".tekton/tasks/post-test-cleanup.yaml"
      workspaces:
        - name: repository
          workspace: repository
